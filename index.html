<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直心流・あなたの「部屋」運気診断</title>
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f9f1d0;
            --gold-dark: #aa8a2e;
            --bg-white: #ffffff;
            --text-main: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg-white);
            background-image: radial-gradient(circle at top right, var(--gold-light), transparent);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--gold-primary);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--gold-dark);
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .card {
            background: white;
            border: 1px solid var(--gold-light);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .question-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--gold-dark);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--gold-primary);
            border-radius: 10px;
            background: white;
            color: var(--gold-dark);
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }

        .btn:active {
            background: var(--gold-primary);
            color: white;
        }

        #result-area {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--gold-primary);
            margin: 10px 0;
        }

        .rank-label {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .advice-box {
            background: var(--gold-light);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 0.95rem;
            text-align: left;
        }

        .ad-space {
            margin-top: 30px;
            padding: 20px;
            border: 1px dashed var(--gold-primary);
            background: #fafafa;
            color: #888;
            font-size: 0.8rem;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--gold-dark);
            margin-top: auto;
        }

        .progress-bar {
            height: 4px;
            background: #eee;
            margin-bottom: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-inner {
            height: 100%;
            background: var(--gold-primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>直心流<br>「部屋」運気診断</h1>
    </header>

    <div id="quiz-area">
        <div class="progress-bar"><div id="progress-inner"></div></div>
        <div id="question-container" class="card">
            <p id="question-text" class="question-title">読み込み中...</p>
            <div id="answer-buttons"></div>
        </div>
    </div>

    <div id="result-area" class="card">
        <h2>診断結果</h2>
        <div class="score-display"><span id="total-score">0</span>点</div>
        <div id="rank-text" class="rank-label"></div>
        <div id="advice-text" class="advice-box"></div>
        
        <button class="btn" onclick="location.reload()" style="background: var(--gold-primary); color: white;">もう一度診断する</button>

        <div class="ad-space">
            【スポンサーリンク】<br>
            ここに広告タグを挿入
        </div>
    </div>
</div>

<footer>
    (C) 2026 stkstk1232 All Rights Reserved
</footer>

<script>
    const questions = [
        {
            q: "玄関に出している「靴」の数は？",
            a: [
                { text: "すべて収納している、または1足のみ", score: 10 },
                { text: "2〜3足出ている", score: 5 },
                { text: "4足以上、出しっぱなし", score: 0 }
            ]
        },
        {
            q: "寝室のカーテンの色は？",
            a: [
                { text: "落ち着いたベージュやパステルカラー", score: 10 },
                { text: "白やグレーなどシンプル", score: 5 },
                { text: "真っ黒や非常に派手な色", score: 0 }
            ]
        },
        {
            q: "部屋に「観葉植物」や「生花」はありますか？",
            a: [
                { text: "生き生きとした植物がある", score: 10 },
                { text: "造花やドライフラワーがある", score: 5 },
                { text: "植物は一切置いていない", score: 0 }
            ]
        },
        {
            q: "床の上に直接置いている「物」はありますか？",
            a: [
                { text: "ほとんど置いていない（スッキリ）", score: 10 },
                { text: "カバンや雑誌が少しある", score: 5 },
                { text: "衣類やゴミ袋などが散乱している", score: 0 }
            ]
        },
        {
            q: "朝、起きたらすぐに窓を開けますか？",
            a: [
                { text: "毎日開けて換気する", score: 10 },
                { text: "たまに開ける", score: 5 },
                { text: "ほとんど開けない", score: 0 }
            ]
        }
    ];

    let currentQuestionIndex = 0;
    let totalScore = 0;

    const questionText = document.getElementById('question-text');
    const answerButtons = document.getElementById('answer-buttons');
    const progressInner = document.getElementById('progress-inner');
    const quizArea = document.getElementById('quiz-area');
    const resultArea = document.getElementById('result-area');
    const totalScoreElement = document.getElementById('total-score');
    const rankText = document.getElementById('rank-text');
    const adviceText = document.getElementById('advice-text');

    function startQuiz() {
        showQuestion();
    }

    function showQuestion() {
        const currentQuestion = questions[currentQuestionIndex];
        questionText.innerText = `${currentQuestionIndex + 1}. ${currentQuestion.q}`;
        answerButtons.innerHTML = '';
        progressInner.style.width = `${(currentQuestionIndex / questions.length) * 100}%`;

        currentQuestion.a.forEach(answer => {
            const button = document.createElement('button');
            button.innerText = answer.text;
            button.classList.add('btn');
            button.addEventListener('click', () => selectAnswer(answer.score));
            answerButtons.appendChild(button);
        });
    }

    function selectAnswer(score) {
        totalScore += score;
        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        quizArea.classList.add('hidden');
        resultArea.style.display = 'block';
        totalScoreElement.innerText = totalScore;

        let rank = "";
        let advice = "";

        if (totalScore >= 40) {
            rank = "【最高】龍神が舞い込む理想の部屋";
            advice = "素晴らしい状態です。今の環境はあなたの才能を最大限に引き出しています。現状を維持しつつ、週に一度、天然塩を入れた水で水拭きをするとさらに運気が強固になります。";
        } else if (totalScore >= 20) {
            rank = "【良好】運気の土台が整った部屋";
            advice = "平均以上に整っていますが、伸び代があります。特に『床に物を置かない』ことを意識するだけで、お金の巡りが劇的に良くなるはずです。不要な雑誌や書類を処分してみましょう。";
        } else {
            rank = "【注意】気が停滞気味の部屋";
            advice = "エネルギーが外に逃げやすくなっています。まずは玄関の掃除から始めましょう。靴をすべてしまい、古い新聞紙などを捨てるだけで、翌日から新しいチャンスが舞い込み始めます。";
        }

        rankText.innerText = rank;
        adviceText.innerText = "直心流アドバイス： " + advice;
    }

    startQuiz();
</script>

</body>
</html>
